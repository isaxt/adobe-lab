<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARSTREET FRUITS ✦ Harajuku Fashion</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="harajuku.css">
</head>

<body>
<div class="page-wrapper">

  <!-- TOP SECTION -->
  <div class="top-section">
    <img class="wig" src="/website_experiments/harajuku_gore/harajuku_assets/wig.png" alt="wig">
    <img class="bow-pink" src="/website_experiments/harajuku_gore/harajuku_assets/bow_1.png" alt="bow">
    <img class="shoes" src="/website_experiments/harajuku_gore/harajuku_assets/shoes.png" alt="shoes">
    <img class="clips" src="/website_experiments/harajuku_gore/harajuku_assets/clip.png" alt="hair clips">
  </div>

  <div class="pink-bar"></div>

  <!-- MIDDLE SECTION -->
  <div class="middle-section">
    <div class="collage-bg"></div>

    <!-- Photo snippets -->
    <div class="photo-snippet" style="top:8px;left:120px;width:70px;height:55px;transform:rotate(-2deg);background:linear-gradient(135deg,#ffb3d9,#d4a0ff);"></div>
    <div class="photo-snippet" style="top:70px;left:118px;width:55px;height:45px;transform:rotate(1deg);background:linear-gradient(135deg,#a0e8ff,#d4ffb3);"></div>
    <div class="photo-snippet" style="bottom:140px;left:118px;width:48px;height:42px;transform:rotate(-1deg);background:linear-gradient(135deg,#ffe0b3,#ffb3d9);"></div>
    <div class="photo-snippet" style="bottom:82px;right:102px;width:55px;height:50px;transform:rotate(2deg);background:linear-gradient(135deg,#d4a0ff,#a0c4ff);"></div>
    <div class="photo-snippet" style="bottom:15px;left:6px;width:60px;height:40px;transform:rotate(-1deg);background:linear-gradient(135deg,#c0f0ff,#e0c0ff);"></div>
    <div class="photo-snippet" style="bottom:55px;left:6px;width:55px;height:42px;transform:rotate(1deg);background:linear-gradient(135deg,#ffe4f0,#fff0c0);"></div>
    <div class="photo-snippet" style="bottom:15px;right:100px;width:52px;height:38px;transform:rotate(-2deg);background:linear-gradient(135deg,#d0ffe0,#c0d4ff);"></div>
    <div class="photo-snippet" style="top:210px;right:100px;width:48px;height:60px;transform:rotate(1deg);background:linear-gradient(180deg,#ffd0ee,#e0d0ff);"></div>

    <!-- Magazine cover -->
    <div class="mag-cover">
      <div class="mag-header">★ FRUITS</div>
      <div class="mag-title">HARSTREET</div>
      <div class="mag-sub">FRUITS EDITION</div>
      <div class="mag-img">✿ CRINOLINE<br>DRESS<br>FEATURE ✿</div>
      <div class="mag-tag">▶ SPECIAL ISSUE</div>
    </div>

    <div class="red-pixel-box"></div>

    <div class="label-hairclips">
      <span>NEW PLUSH<br>HAIR CLIPS</span>
    </div>

    <div class="socks-col">
      <div class="sock-item"><div class="sock-stripe"></div></div>
      <div class="sock-item"><div class="sock-stripe"></div></div>
      <div class="sock-item"><div class="sock-stripe"></div></div>
    </div>

    <div class="label-socks">
      <span>HARSTREET<br>PIXEL SOCKS</span>
    </div>

    <div class="label-cloud-kitty">
      <span>RAINBOW<br>CLOUD KITTY</span>
    </div>

    <div class="accessories-grid">
      <div class="acc-item">🌈</div>
      <div class="acc-item">⭐</div>
      <div class="acc-item">🍬</div>
      <div class="acc-item">🎀</div>
    </div>

    <div class="label-crinoline">
      <span>CRINOLINE<br>DRESS</span>
    </div>

    <div class="center-outfit">
      <div class="outfit-frame">
        <img class="dress-img" src="/website_experiments/harajuku_gore/harajuku_assets/dress.png" alt="crinoline dress outfit">
      </div>
    </div>

    <div class="bottom-accessories">
      <div class="bag-placeholder">👜</div>
      <img src="/website_experiments/harajuku_gore/harajuku_assets/shoes.png" alt="shoes" style="width:60px;">
    </div>

    <div class="label-charms">
      <span>CLOUD MASCOT<br>CHARMS</span>
    </div>
  </div>

  <div class="pink-bar"></div>

  <!-- BOTTOM SECTION -->
  <div class="bottom-section">
    <img class="dress-bottom" src="/website_experiments/harajuku_gore/harajuku_assets/dress.png" alt="pink dress set">
    <img class="bow-star" src="/website_experiments/harajuku_gore/harajuku_assets/bow_2.png" alt="bow">
  </div>

</div>

<!-- External JS -->
<script src="script.js"></script>
</body>
</html>
