<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(some kind of poetic title)</title>

<link rel="stylesheet" href="surreal.css">

</head>
<body>

<div class="scene" id="scene">
  <img class="bg" src="/website_experiments/surreal_website/surreal_assets/colorful_background.png" alt="">

  <span class="title">(some kind of poetic title)</span>

  
  <img class="checker" src="/website_experiments/surreal_website/surreal_assets/checker_room.png" alt="Checker room" data-speed="0.3">
  <img class="orb" src="/website_experiments/surreal_website/surreal_assets/orb.png" alt="Orb" data-speed="0.5">
  <img class="angel-face" src="/website_experiments/surreal_website/surreal_assets/angel_face.png" alt="Angel face" data-speed="0.2">
  <img class="hippo" src="/website_experiments/surreal_website/surreal_assets/hippo.png" alt="Hippo" data-speed="0.4">
  <img class="split-statue" src="/website_experiments/surreal_website/surreal_assets/split_statue.png" alt="Split statue" data-speed="0.3">
  <img class="stairwell" src="/website_experiments/surreal_website/surreal_assets/stairwell_door.png" alt="Stairwell door" data-speed="0.25">
  <img class="sun-stairs" src="/website_experiments/surreal_website/surreal_assets/sun_stairs.png" alt="Sun stairs" data-speed="0.15">


  <div id="quote-container"></div>
  
  <div class="vignette"></div>
  <div class="grain"></div>
</div>


<!-- JS -->
<script src="surreal.js"></script>

</body>
</html>
