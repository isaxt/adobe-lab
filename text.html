<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Will Caring About Art Look Like?</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
/* ======================
   DESIGN SYSTEM
====================== */
:root {
  --bg-machine: #0a0a0a;
  --bg-human: #fdf6f0;
  --accent: #4da6ff;
  --text-machine: #e6f0ff;
  --text-human: #2a2a2a;
}

body {
  margin: 0;
  font-family: 'IBM Plex Mono', monospace;
  transition: background 0.6s ease, color 0.6s ease;
}

/* MODES */
body.machine {
  background: var(--bg-machine);
  color: var(--text-machine);
}

body.human {
  background: var(--bg-human);
  color: var(--text-human);
  font-family: 'Playfair Display', serif;
}

body.collision {
  background: linear-gradient(120deg, var(--bg-machine), var(--bg-human));
  color: white;
}

section {
  min-height: 100vh;
  padding: 80px 10vw;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ======================
   HERO
====================== */
.hero h1 {
  font-size: 4rem;
  line-height: 1.1;
  cursor: pointer;
}

.glitch:hover {
  text-shadow: 2px 0 red, -2px 0 blue;
}

/* ======================
   TIMELINE
====================== */
.timeline-item {
  opacity: 0.3;
  transition: all 0.4s ease;
  margin-bottom: 40px;
}

.timeline-item.active {
  opacity: 1;
  transform: scale(1.05);
}

/* ======================
   QUESTIONS
====================== */
.question {
  border: 1px solid currentColor;
  padding: 20px;
  margin: 20px 0;
  cursor: pointer;
  transition: all 0.3s ease;
}

.question.active {
  background: rgba(255,255,255,0.1);
}

.answer {
  display: none;
  margin-top: 10px;
}

/* ======================
   AUTHENTICITY DETECTOR
====================== */
.detector {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 12px;
  opacity: 0.7;
}

/* ======================
   PARTICIPATION
====================== */
.response {
  position: absolute;
  max-width: 200px;
  font-size: 12px;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

</style>
</head>

<body class="machine">

<!-- HERO -->
<section class="hero">
  <h1 id="heroText" class="glitch">What will caring about art look like?</h1>
</section>

<!-- TIMELINE -->
<section>
  <div class="timeline-item">Pre-AI: Craft & Labor</div>
  <div class="timeline-item">Early AI: Assistance</div>
  <div class="timeline-item">Now: Generation</div>
  <div class="timeline-item">Future: Simulation</div>
</section>

<!-- QUESTIONS -->
<section>
  <div class="question">Is art still meaningful?
    <div class="answer">Human: Meaning comes from intent.<br>AI: Meaning is pattern recognition.</div>
  </div>

  <div class="question">Who is the author?
    <div class="answer">Human: The creator.<br>AI: The system.</div>
  </div>
</section>

<!-- PARTICIPATION -->
<section id="participation">
</section>

<div class="detector" id="detector">Authenticity: --%</div>

<script>
/* ======================
   MODE SWITCH ON SCROLL
====================== */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;
  const height = window.innerHeight;

  sections.forEach((section, i) => {
    const top = section.offsetTop;
    if (scrollY >= top - height/2) {
      if (i === 0) document.body.className = "machine";
      if (i === 1) document.body.className = "human";
      if (i === 2) document.body.className = "collision";
    }
  });
});

/* ======================
   HERO TOGGLE TEXT
====================== */
const hero = document.getElementById("heroText");
const variants = [
  "What will caring about art look like?",
  "What will caring look like?",
  "What will art look like?"
];

let i = 0;
hero.addEventListener("click", () => {
  i = (i + 1) % variants.length;
  hero.innerText = variants[i];
});

/* ======================
   TIMELINE INTERACTION
====================== */
const timelineItems = document.querySelectorAll(".timeline-item");

window.addEventListener("scroll", () => {
  timelineItems.forEach(item => {
    const rect = item.getBoundingClientRect();
    if (rect.top < window.innerHeight * 0.6) {
      item.classList.add("active");
    }
  });
});

/* ======================
   QUESTIONS INTERACTION
====================== */
const questions = document.querySelectorAll(".question");

questions.forEach(q => {
  q.addEventListener("click", () => {
    questions.forEach(x => x.classList.remove("active"));
    q.classList.add("active");

    const answer = q.querySelector(".answer");
    answer.style.display = "block";
  });
});

/* ======================
   AUTHENTICITY DETECTOR
====================== */
document.addEventListener("mousemove", () => {
  const value = Math.floor(Math.random() * 100);
  document.getElementById("detector").innerText = `Human Authenticity: ${value}%`;
});

/* ======================
   PARTICIPATION RANDOM RESPONSES
====================== */
const container = document.getElementById("participation");

function addResponse(text) {
  const div = document.createElement("div");
  div.className = "response";
  div.innerText = text;

  div.style.left = Math.random() * 80 + "%";
  div.style.top = Math.random() * 80 + "%";

  container.appendChild(div);
}

setInterval(() => {
  addResponse("This may have been generated.");
}, 2000);

</script>

</body>
</html>
